<!DOCTYPE html>
<html>
<head>
	<link rel="shortcut icon" type="image/x-icon" href="img/logo.ico">
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="estilos/index.css">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glider-js@1.7.3/glider.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
	<title>Atlas - Ropa Online</title>
</head>
<body>
	<!-- Contenedor Principal -->
	<div class="contenedor">
		<header>
			<div class="header__logo">
				<a href="index.html">
					<img src="img/logo4.png">
				</a>
				<div class="header__login">
					<a href="#" class="iniciar_sesion" id="login">Iniciar Sesión</a>
					<a href="#" class="carrito fas fa-shopping-cart" id="btn-abrir-carrito"></a>
				</div>
			</div>
			<nav>
				<a href="index.html">Inicio</a>
				<a href="mujer_buzos.html">Mujer</a>
				<a href="hombre_buzos.html">Hombre</a>
				<a href="contacto.html">Contacto</a>
				<a href="Register.html">Registrate!</a>
			</nav>
		</header>

		<!-- Slider -->

		<section class="banner">
			<div class="banner__contenedor">
				<button aria-label="Anterior" class="banner__anterior">
					<i class="fas fa-chevron-left"></i>
				</button>

				<div class="banner__lista">
					<div class="banner__elemento">
						<img src="img/banner.jpg" alt="Atlas Deportivo">
					</div>
					<div class="banner__elemento">
						<img src="img/banner_2.jpg" alt="Atlas Mujer">
					</div>
					<div class="banner__elemento">
						<img src="img/banner_3.jpg" alt="Atlas Hombre">
					</div>
				</div>
				
				<button aria-label="Siguiente" class="banner__siguiente">
					<i class="fas fa-chevron-right"></i>
				</button>
			</div>
			<div role="tablist" class="banner__indicadores"></div>
		</section>
	
		<!-- Footer -->

		<footer class="footer">
			<div class="lista">
				<a href="index.html">Inicio</a><span> |</span>
				<a href="hombre_buzos.html">Ropa Hombre</a><span> |</span>
				<a href="mujer_buzos.html">Ropa Mujer</a><span> |</span>
				<a href="contacto.html">Contacto</a>
			</div>
			<div class="logos">
				<a href="https://www.facebook.com/"><div class="fab fa-facebook-f"></div></a>
				<a href="https://twitter.com/home"><div class="fab fa-twitter"></div></a>
				<a href="https://dribbble.com/"><div class="fab fa-dribbble"></div></a>
				<a href="https://linkedin.com/"><div class="fab fa-linkedin-in"></div></a>
				<a href="#"><div class="fab fa-google-plus-g"></div></a>		
			</div>
			<div class="copyright">
				<p>Copyright © 2021 ATLAS S.A| Designed By: Tejada and Lujan S.A, All rights reserved.</p>
			</div> 
		</footer>
	</div>
	<!--Ventana emergente de iniciar sesión -->
	<div class="overlay" id="overlay">
		<div class="popup" id="popup">
				<a href="#" id="btn-cerrar-popup" class="btn-cerrar-popup"><i class="fas fa-times"></i></a>
				<h3>Inicia Sesión</h3>
				<h4><a href="Register.html">o haz click aquí para registrarte</a></h4>
				<form action="#" method="post">
					<div class="contenedor-inputs">
						<input type="email" name="username" placeholder="Correo">
						<input type="password" name="contraseña" placeholder="Contraseña">
					</div>
					<input type="submit" class="btn-submit"name="" value="Iniciar Sesión">
				</form>
		</div>
	</div>
	
	<script src="https://cdn.jsdelivr.net/npm/glider-js@1.7.3/glider.min.js"></script>
	<script src="js/popup.js"></script>
	<script src="js/banner.js"></script>

</body>
</html>
